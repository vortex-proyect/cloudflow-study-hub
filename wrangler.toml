name = "cloudflow-study-hub"
main = ".open-next/worker.js"
compatibility_date = "2024-05-01"
compatibility_flags = [ "nodejs_compat" ]

[[d1_databases]]
binding = "DB"
database_name = "cloudflow-db"
database_id = "cloudflow-db-prod-id" # Replace with actual ID after creation

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cloudflow-docs-storage"

[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "cloudflow-embeddings-index"
